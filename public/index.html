<style>
/* v4 · Editorial brutalista · type-first, sem chrome */
:root{
  --accent:#F26600; --accent-soft:#FF8A3D; --accent-deep:#D4540A;
  --accent-bg:#FFF1E3; --accent-tint:#FFE2C2;
  --ink:#1a1612; --ink-soft:#3d342b; --ink-mute:#7a6f63; --ink-faint:#a89c8a;
  --paper:#f5f1ea; --paper-warm:#ede6d9; --paper-deep:#e2dac9;
  --rule:#1a1612; --rule-soft:#d4c9b8;
  --olive:#6b6d3a; --danger:#a64545;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter Tight',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100%}
html{font-size:16px;text-rendering:optimizeLegibility}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:"kern" 1,"liga" 1,"calt" 1;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;text-align:left}
::selection{background:var(--accent);color:var(--paper)}
img,svg{display:block;max-width:100%}

/* MASTHEAD · régua dupla */
.masthead{position:sticky;top:0;z-index:80;background:var(--paper);border-bottom:2px solid var(--ink)}
.masthead-rule{height:1px;background:var(--ink);opacity:.4}
.masthead-row{display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;padding:14px 24px}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{height:18px;width:auto;color:var(--ink);display:block}
.brand-meta{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);padding-left:14px;border-left:1px solid var(--ink);opacity:.7;display:none}
.brand-meta b{color:var(--ink);font-weight:500}
.ticks{display:flex;gap:3px;align-items:center;justify-content:center;flex-wrap:nowrap}
.tick{width:14px;height:2px;background:var(--rule-soft);transition:background 300ms var(--ease)}
.tick.done{background:var(--accent)}
.tick.now{background:var(--ink);height:4px}
.score-pill{display:flex;align-items:baseline;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute)}
.score-pill .sp-v{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--accent);font-variation-settings:"opsz" 36;letter-spacing:-.02em;font-feature-settings:"tnum" 1}
@media (max-width:640px){
  .masthead-row{padding:12px 20px;gap:14px}
  .brand-meta{display:none}
  .ticks{gap:2px}
  .tick{width:9px}
  .score-pill{font-size:10px}
  .score-pill .sp-v{font-size:18px}
}
@media (min-width:1024px){
  .masthead-row{padding:18px 48px}
  .brand-meta{display:inline-flex}
  .tick{width:18px}
}
.masthead.idle .ticks,.masthead.idle .score-pill{visibility:hidden}

/* STAGE */
.stage{min-height:calc(100vh - 64px);padding:32px 24px 80px;display:flex;flex-direction:column;justify-content:flex-start;position:relative}
@media (min-width:1024px){.stage{padding:48px 48px 96px;min-height:calc(100vh - 72px)}}

/* WELCOME */
.welcome{display:grid;grid-template-columns:1fr;gap:32px;max-width:1200px;margin:0 auto;width:100%}
@media (min-width:900px){.welcome{grid-template-columns:1.4fr 1fr;gap:64px;padding-top:48px}}
.w-eyebrow{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px}
.w-eyebrow::before{content:"";width:36px;height:1px;background:var(--accent)}
.w-display{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(56px,12vw,140px);line-height:.92;letter-spacing:-.04em;font-variation-settings:"opsz" 144;color:var(--ink);margin:20px 0 0}
.w-display em{font-style:italic;color:var(--accent)}
.w-display .dot{color:var(--accent);font-style:normal}
.w-lede{font-family:var(--serif);font-weight:400;font-size:clamp(17px,2vw,21px);line-height:1.55;letter-spacing:-.005em;font-variation-settings:"opsz" 18;color:var(--ink-soft);max-width:34em;margin-top:28px}
.w-lede strong{color:var(--ink);font-weight:500}
.w-side{display:flex;flex-direction:column;justify-content:space-between;border-top:2px solid var(--ink)}
.w-side-row{display:grid;grid-template-columns:auto 1fr;align-items:baseline;gap:20px;padding:18px 0;border-bottom:1px solid var(--rule-soft)}
.w-side-row:last-child{border-bottom:0}
.w-side-l{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
.w-side-v{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(34px,5vw,52px);line-height:.95;letter-spacing:-.03em;font-variation-settings:"opsz" 96;color:var(--ink);text-align:right;font-feature-settings:"tnum" 1}
.w-side-v em{color:var(--accent)}
.resume-banner{display:none;align-items:flex-start;gap:14px;background:var(--ink);color:var(--paper);padding:18px 22px;margin-top:24px;border-left:6px solid var(--accent)}
.resume-banner.show{display:flex}
.resume-banner .rb-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.resume-banner .rb-l{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.resume-banner .rb-t{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--paper);line-height:1.4}
.resume-banner .rb-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;align-items:center}
.resume-banner .rb-go{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--accent);text-decoration:underline;text-underline-offset:4px;background:transparent;border:0;cursor:pointer;padding:0}
.resume-banner .rb-no{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);background:transparent;border:0;cursor:pointer;padding:0}
.resume-banner .rb-no:hover{color:var(--paper)}
.w-cta{margin-top:40px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;border-top:1px solid var(--ink);padding-top:32px}
.btn-massive{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(28px,4vw,40px);line-height:1;letter-spacing:-.02em;font-variation-settings:"opsz" 48;color:var(--ink);background:transparent;border:0;padding:0;cursor:pointer;display:inline-flex;align-items:baseline;gap:18px;transition:color 200ms var(--ease);position:relative}
.btn-massive::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:3px;background:var(--ink);transform-origin:left;transition:transform 300ms var(--ease-out),background 200ms var(--ease)}
.btn-massive:hover{color:var(--accent)}
.btn-massive:hover::after{background:var(--accent);transform:scaleX(1.05)}
.btn-massive .arrow{font-family:var(--mono);font-size:.55em;font-style:normal;letter-spacing:.04em;color:var(--accent);transition:transform 280ms var(--ease-out)}
.btn-massive:hover .arrow{transform:translateX(8px)}
.w-hint{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
.welcome > *{opacity:0;transform:translateY(12px);animation:rise 700ms var(--ease-out) forwards}
.welcome > .w-side > *{opacity:0;transform:translateY(8px);animation:rise 500ms var(--ease-out) forwards}
.welcome > *:nth-child(1){animation-delay:80ms}
.welcome > *:nth-child(2){animation-delay:200ms}
.welcome > .w-side > *:nth-child(1){animation-delay:240ms}
.welcome > .w-side > *:nth-child(2){animation-delay:300ms}
.welcome > .w-side > *:nth-child(3){animation-delay:360ms}
.welcome > .w-side > *:nth-child(4){animation-delay:420ms}

/* QUESTION */
.question{display:grid;grid-template-columns:1fr;gap:32px;max-width:1200px;margin:0 auto;width:100%}
@media (min-width:900px){.question{grid-template-columns:auto 1fr;gap:48px;align-items:start}}
.q-decoration{display:flex;flex-direction:column;gap:14px;align-items:flex-start;padding-bottom:24px;border-bottom:1px solid var(--rule-soft)}
@media (min-width:900px){.q-decoration{border-bottom:0;border-right:1px solid var(--rule-soft);padding:0 48px 0 0;min-width:200px;position:sticky;top:88px}}
.q-number{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(120px,22vw,260px);line-height:.78;letter-spacing:-.06em;font-variation-settings:"opsz" 144;color:var(--accent);font-feature-settings:"tnum" 1}
.q-meta{display:flex;flex-direction:column;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase}
.q-meta .q-block{color:var(--ink)}
.q-meta .q-weight{color:var(--ink-mute)}
.q-body{display:flex;flex-direction:column;gap:24px;min-width:0}
.q-text{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4.2vw,46px);line-height:1.1;letter-spacing:-.025em;font-variation-settings:"opsz" 96;color:var(--ink)}
.q-text em{font-style:italic;color:var(--accent);font-variation-settings:"opsz" 96}
.q-context{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(15px,1.6vw,18px);line-height:1.55;font-variation-settings:"opsz" 18;color:var(--ink-mute);padding:0 0 0 18px;border-left:2px solid var(--accent);max-width:38em}
.q-options{display:flex;flex-direction:column;gap:0;margin-top:16px;border-top:1px solid var(--ink)}
.opt{display:grid;grid-template-columns:64px 1fr;gap:24px;align-items:start;width:100%;text-align:left;background:transparent;border:0;border-bottom:1px solid var(--rule-soft);padding:24px 0;cursor:pointer;position:relative;transition:background 200ms var(--ease),padding-left 280ms var(--ease-out)}
.opt::before{content:"";position:absolute;left:-24px;right:-24px;top:0;bottom:0;background:transparent;transition:background 200ms var(--ease);z-index:-1}
.opt:hover::before{background:var(--paper-warm)}
.opt:hover{padding-left:8px}
.opt.selected::before{background:var(--accent-bg)}
.opt.selected{padding-left:12px}
.opt-num{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(40px,5.5vw,64px);line-height:.9;letter-spacing:-.04em;font-variation-settings:"opsz" 96;color:var(--accent);font-feature-settings:"tnum" 1;transition:transform 280ms var(--ease-out)}
.opt.selected .opt-num{transform:translateX(4px)}
.opt-body{display:flex;flex-direction:column;gap:6px;min-width:0;padding-top:4px}
.opt-label{font-family:var(--serif);font-weight:500;font-size:clamp(17px,2vw,22px);line-height:1.3;letter-spacing:-.015em;font-variation-settings:"opsz" 36;color:var(--ink)}
.opt-desc{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(14px,1.4vw,16px);line-height:1.5;font-variation-settings:"opsz" 14;color:var(--ink-mute)}
.q-nav{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-top:24px;flex-wrap:wrap}
.btn-back{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);background:transparent;border:0;padding:8px 0;cursor:pointer;transition:color 200ms var(--ease)}
.btn-back:hover{color:var(--ink)}
.btn-back:disabled{opacity:.2;cursor:not-allowed}
.q-step{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
.q-step b{font-family:var(--serif);font-size:13px;color:var(--accent);font-weight:500;letter-spacing:-.01em;font-style:italic}
.question > *{opacity:0;animation:fade-up 460ms var(--ease-out) forwards}
.question > *:nth-child(1){animation-delay:0ms}
.question > *:nth-child(2){animation-delay:120ms}
.opt{opacity:0;transform:translateY(8px);animation:fade-up 440ms var(--ease-out) forwards}
.opt:nth-child(1){animation-delay:200ms}
.opt:nth-child(2){animation-delay:260ms}
.opt:nth-child(3){animation-delay:320ms}
.opt:nth-child(4){animation-delay:380ms}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* PHONE */
.phone-stage{display:grid;grid-template-columns:1fr;gap:32px;max-width:1200px;margin:0 auto;width:100%;align-items:start}
@media (min-width:900px){.phone-stage{grid-template-columns:auto 1fr;gap:48px}}
.phone-num{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(80px,16vw,180px);line-height:.85;letter-spacing:-.05em;font-variation-settings:"opsz" 144;color:var(--accent);padding-bottom:18px;border-bottom:1px solid var(--rule-soft)}
@media (min-width:900px){.phone-num{border-bottom:0;border-right:1px solid var(--rule-soft);padding:0 48px 0 0;min-width:200px}}
.phone-body{display:flex;flex-direction:column;gap:28px;min-width:0;max-width:42em}
.phone-h{font-family:var(--serif);font-weight:500;font-size:clamp(28px,4vw,44px);line-height:1.1;letter-spacing:-.025em;font-variation-settings:"opsz" 96;color:var(--ink)}
.phone-h em{font-style:italic;color:var(--accent)}
.phone-context{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(15px,1.6vw,17px);line-height:1.55;font-variation-settings:"opsz" 18;color:var(--ink-mute)}
.phone-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-top:8px}
.phone-input{font-family:var(--serif);font-weight:500;font-size:clamp(30px,5vw,52px);line-height:1.1;letter-spacing:-.02em;font-variation-settings:"opsz" 96;padding:6px 0 14px;border:0;border-bottom:2px solid var(--ink);background:transparent;color:var(--ink);outline:none;width:100%;transition:border-color 200ms var(--ease);font-feature-settings:"tnum" 1}
.phone-input::placeholder{color:var(--ink-faint);font-style:italic}
.phone-input:focus{border-color:var(--accent)}
.phone-input.invalid{border-color:var(--danger)}
.phone-trust{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute)}
.phone-stage > *{opacity:0;animation:fade-up 540ms var(--ease-out) forwards}
.phone-stage > *:nth-child(1){animation-delay:80ms}
.phone-stage > *:nth-child(2){animation-delay:200ms}

/* TRANSITION */
.transition-stage{min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:32px;padding:24px}
.transition-canvas{position:relative;height:120px;display:flex;align-items:center;justify-content:center}
.transition-phrase{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(26px,5vw,48px);line-height:1.12;letter-spacing:-.025em;font-variation-settings:"opsz" 96;color:var(--ink-soft);max-width:18ch;opacity:0;position:absolute}
.transition-phrase em{color:var(--accent)}
.transition-phrase.active{animation:phrase-fade 800ms var(--ease) forwards}
@keyframes phrase-fade{0%{opacity:0;transform:translateY(12px)}30%,70%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-8px)}}
.transition-bar{width:160px;height:1px;background:var(--rule-soft);overflow:hidden}
.transition-bar-fill{height:100%;background:var(--accent);width:0%}

/* RESULT */
.result{display:flex;flex-direction:column;gap:0;max-width:1200px;margin:0 auto;width:100%}
.r-hero{display:grid;grid-template-columns:1fr;gap:24px;padding:24px 0 56px;border-bottom:2px solid var(--ink)}
@media (min-width:900px){.r-hero{grid-template-columns:1.4fr 1fr;gap:64px;padding:32px 0 80px;align-items:end}}
.r-eyebrow{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px}
.r-eyebrow::before{content:"";width:36px;height:1px;background:var(--accent)}
.r-pre{font-family:var(--serif);font-weight:400;font-style:italic;font-size:clamp(18px,2.4vw,26px);line-height:1.3;letter-spacing:-.01em;font-variation-settings:"opsz" 36;color:var(--ink-soft);margin-top:16px}
.r-pre em{color:var(--accent)}
.r-score{font-family:var(--serif);font-weight:500;color:var(--accent);font-size:clamp(140px,28vw,280px);line-height:.78;letter-spacing:-.06em;font-variation-settings:"opsz" 144;font-feature-settings:"tnum" 1;margin:24px 0 0;display:block}
.r-score .r-of{font-size:.18em;color:var(--ink-mute);font-weight:400;letter-spacing:-.01em;font-style:italic;font-variation-settings:"opsz" 24;margin-left:.05em}
.r-rightcol{display:flex;flex-direction:column;gap:20px;padding-top:8px}
.r-level-tag{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute)}
.r-level-name{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(28px,3.6vw,40px);line-height:1.05;letter-spacing:-.03em;font-variation-settings:"opsz" 96;color:var(--ink)}
.r-msg{font-family:var(--serif);font-weight:400;font-size:clamp(15px,1.6vw,18px);line-height:1.55;font-variation-settings:"opsz" 18;color:var(--ink-soft);max-width:30em}
.r-msg strong{color:var(--ink);font-weight:500}
.r-pillars{padding:56px 0 32px;border-bottom:2px solid var(--ink)}
.r-section-tag{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;display:flex;align-items:center;gap:12px}
.r-section-tag::before{content:"01";color:var(--ink);font-weight:500}
.r-section-tag.tag-02::before{content:"02"}
.r-section-tag::after{content:"";flex:1;height:1px;background:var(--rule-soft)}
.pillar-line{display:grid;grid-template-columns:auto 1fr auto;align-items:baseline;gap:18px;padding:18px 0;border-bottom:1px solid var(--rule-soft);position:relative}
.pillar-line.locked{opacity:.5}
.pl-name{font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(22px,3.5vw,36px);line-height:1.05;letter-spacing:-.025em;font-variation-settings:"opsz" 48;color:var(--ink);min-width:8ch}
.pl-track{position:relative;height:1px;background:var(--rule-soft);align-self:center;margin-top:6px;flex:1;min-width:60px}
.pl-fill{position:absolute;left:0;top:-2px;height:5px;width:0%;background:var(--accent);transition:width 1200ms var(--ease-out)}
.pl-score{font-family:var(--serif);font-weight:500;font-size:clamp(32px,4.5vw,52px);line-height:.95;letter-spacing:-.03em;font-variation-settings:"opsz" 96;color:var(--accent);text-align:right;min-width:3.6ch;font-feature-settings:"tnum" 1}
.pl-score small{font-size:.45em;color:var(--ink-mute);font-weight:400;font-style:italic;margin-left:2px}
.pl-insight{grid-column:1 / -1;font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(14px,1.5vw,17px);line-height:1.55;font-variation-settings:"opsz" 18;color:var(--ink-soft);max-width:48em;margin-top:6px}
.pillar-line.locked .pl-name,.pillar-line.locked .pl-score{filter:blur(3px)}
.pillar-line.locked .pl-insight{font-style:italic;color:var(--ink-mute);font-size:13px;filter:none}
.r-pillars .pillar-line{opacity:0;animation:fade-up 600ms var(--ease-out) forwards}
.r-ctas{padding:56px 0 24px}
.cta-grid{display:grid;grid-template-columns:1fr;gap:24px;margin-top:24px}
@media (min-width:900px){.cta-grid{grid-template-columns:1.4fr 1fr;gap:40px}}
.cta{display:flex;flex-direction:column;gap:18px;padding:28px;border:1px solid var(--rule-soft);background:var(--paper);position:relative}
.cta.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cta-tag{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.cta-h{font-family:var(--serif);font-weight:500;font-size:clamp(22px,3vw,30px);line-height:1.1;letter-spacing:-.022em;font-variation-settings:"opsz" 48}
.cta-h em{font-style:italic;color:var(--accent)}
.cta.primary .cta-h{color:var(--paper)}
.cta-d{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(15px,1.5vw,17px);line-height:1.5;font-variation-settings:"opsz" 18;color:var(--ink-mute)}
.cta.primary .cta-d{color:#cfc9bf}
.cta-btn{font-family:var(--serif);font-style:italic;font-weight:500;font-size:clamp(18px,2vw,22px);line-height:1;letter-spacing:-.015em;font-variation-settings:"opsz" 36;background:transparent;border:0;padding:0;cursor:pointer;display:inline-flex;align-items:baseline;gap:14px;align-self:flex-start;margin-top:auto;position:relative;color:var(--accent);transition:color 200ms var(--ease)}
.cta-btn::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--accent);transform-origin:left;transition:transform 280ms var(--ease-out)}
.cta-btn:hover::after{transform:scaleX(1.04)}
.cta-btn .arrow{font-family:var(--mono);font-size:.6em;font-style:normal;letter-spacing:.04em;transition:transform 280ms var(--ease-out)}
.cta-btn:hover .arrow{transform:translateX(6px)}
.r-footnote{margin-top:48px;padding-top:24px;border-top:1px solid var(--rule-soft);font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center}
.r-save{color:var(--olive);min-height:14px}
.r-hero > *{opacity:0;animation:fade-up 700ms var(--ease-out) forwards}
.r-hero > .r-leftcol .r-eyebrow{animation-delay:100ms}
.r-hero > .r-leftcol .r-pre{animation-delay:220ms}
.r-hero > .r-leftcol .r-score{animation:score-in 1100ms var(--ease-out) 380ms forwards}
.r-hero > .r-rightcol{animation-delay:1500ms}
@keyframes score-in{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.r-pillars .r-section-tag,.r-ctas .r-section-tag{opacity:0;animation:fade-up 600ms var(--ease-out) forwards}
.r-pillars .r-section-tag{animation-delay:2000ms}
.r-pillars .pillar-line:nth-of-type(1){animation-delay:2150ms}
.r-pillars .pillar-line:nth-of-type(2){animation-delay:2230ms}
.r-pillars .pillar-line:nth-of-type(3){animation-delay:2310ms}
.r-pillars .pillar-line:nth-of-type(4){animation-delay:2390ms}
.r-pillars .pillar-line:nth-of-type(5){animation-delay:2470ms}
.r-pillars .pillar-line:nth-of-type(6){animation-delay:2550ms}
.r-pillars .pillar-line:nth-of-type(7){animation-delay:2630ms}
.r-pillars .pillar-line:nth-of-type(8){animation-delay:2710ms}
.r-ctas .r-section-tag{animation-delay:3000ms}
.r-ctas .cta-grid{opacity:0;animation:fade-up 700ms var(--ease-out) 3200ms forwards}
.r-footnote{opacity:0;animation:fade-up 500ms var(--ease) 3600ms forwards}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  .r-hero > *,.r-pillars > *,.r-ctas > *,.r-footnote,.pillar-line,.opt,.welcome > *,.welcome > .w-side > *{opacity:1 !important;transform:none !important}
}

function uuid(){
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c => (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}
function saveState(){ try{ localStorage.setItem(CONFIG.STATE_KEY, JSON.stringify({ ...state, savedAt:Date.now() })); }catch(e){} }
function loadState(){
  try{
    const raw = localStorage.getItem(CONFIG.STATE_KEY); if(!raw) return null;
    const parsed = JSON.parse(raw);
    const ageDays = (Date.now() - (parsed.savedAt||0)) / 86400000;
    if(ageDays > CONFIG.STATE_TTL_DAYS){ localStorage.removeItem(CONFIG.STATE_KEY); return null; }
    return parsed;
  }catch(e){ return null; }
}
function clearState(){ try{ localStorage.removeItem(CONFIG.STATE_KEY); }catch(e){} }

function track(event, data){
  const payload = { ts: new Date().toISOString(), ...(data||{}) };
  try{ if(window.gtag) window.gtag("event", event, payload); }catch(e){}
  try{ if(window.fbq) window.fbq("trackCustom", event, payload); }catch(e){}
  try{
    const client = getSupabase();
    if(client){
      client.from("diagnostico_eventos").insert({event_name: event, event_data: payload, diag_id: state.diagId || null}).then(()=>{}).catch(()=>{});
    }
  }catch(e){}
}

let sb = null;
function getSupabase(){
  if(sb) return sb;
  if(CONFIG.SUPABASE_URL && window.supabase){
    try{ sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY); }
    catch(e){ console.error("Supabase init falhou:", e); }
  }
  return sb;
}

function blockPct(b){ const max = BLOCKS[b].max; if(!max) return 0; return Math.round((state.blockScores[b]/max) * 100); }
function totalScore(){ let earned = 0; BLOCK_ORDER.forEach(b => earned += (state.blockScores[b]||0)); return Math.round((earned/SCORE_MAX) * 100); }
function levelFor(score){ return LEVELS.find(l => score>=l.min && score<=l.max) || LEVELS[0]; }
function insightFor(b, pct){ const lvl = pct >= 70 ? "high" : (pct >= 35 ? "mid" : "low"); return INSIGHTS[b][lvl]; }
function evaluateMql(){
  const p42 = state.answers.P42?.tag || "";
  const telOk = (state.phone || "").replace(/\D/g,"").length >= 10;
  const decisor = (p42 === "decisor");
  const cruzaMql = decisor;
  const isMql = decisor && telOk;
  const tag = isMql ? "MQL" : (decisor ? "MQL_sem_telefone" : "lead_nutricao");
  return { isMql, decisor, telOk, cruzaMql, tag };
}
function maskPhone(v){
  const d = v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2) return d;
  if(d.length<=6) return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}

  let html = "";

    html += `<span class="tick ${cls}"></span>`;
  }
  ticksEl.innerHTML = html;
}
function updateMasthead(){
  if(state.screen === "welcome" || state.screen === "transition"){
    masthead.classList.add("idle");
    brandCtx.textContent = state.screen === "transition" ? "Calculando" : "v4";
    return;
  }
  masthead.classList.remove("idle");
  if(state.screen === "result"){
    renderTicks(STEP_TOTAL); brandCtx.textContent = "Resultado"; scorePill.textContent = totalScore(); return;
  }
  const idx = state.screen === "phone" ? STEP_TOTAL - 1 : state.qIndex;
  renderTicks(idx);
  scorePill.textContent = totalScore();
  if(state.screen === "phone"){ brandCtx.textContent = "Final"; }
  else {
    const b = QUESTIONS[state.qIndex]?.block;
    brandCtx.textContent = b && BLOCKS[b] ? BLOCKS[b].name : "Qualif.";
  }
}

function animateScoreCount(target){
  const el = document.getElementById("rScore"); if(!el) return;
  const dur = 1100; const startDelay = 480;
  setTimeout(() => {
    const t0 = performance.now();
    function tick(t){
      const p = Math.min((t - t0)/dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const val = Math.round(eased * target);
      el.innerHTML = `${val}<span class="r-of">/100</span>`;
      if(p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }, startDelay);
}

function startDiagnostic(){
  hasResumable = false;
  state = freshState(); state.diagId = uuid(); state.startedAt = new Date().toISOString();
  state.screen = "question"; state.qIndex = 0;
  saveState(); track("diag_start", { diag_id: state.diagId }); render();
}
function resumeDiagnostic(){
  hasResumable = false;
  if(state.qIndex >= TOTAL_Q){ state.screen = "phone"; } else { state.screen = "question"; }
  track("diag_resume", { step: state.qIndex, diag_id: state.diagId }); render();
}
function discardResume(){ clearState(); hasResumable = false; state = freshState(); render(); }
function selectOption(i){
  const q = QUESTIONS[state.qIndex];
  const opt = q.options[i];
  if(state.answers[q.id] && typeof state.answers[q.id].pts === "number"){
    state.blockScores[q.block] = (state.blockScores[q.block]||0) - state.answers[q.id].pts;
  }
  state.answers[q.id] = {
    idx:i, label:opt.label, val:opt.val ?? null,
    pts: typeof opt.pts === "number" ? opt.pts : null,
    tag: opt.tag ?? null, block: q.block, type: q.type
  };
  if(typeof opt.pts === "number"){ state.blockScores[q.block] = (state.blockScores[q.block]||0) + opt.pts; }
  saveState();
  const dt = Math.round((Date.now() - questionStartTime)/1000);
  track("diag_answer", { question_id: q.id, option: String(i+1).padStart(2,"0"), pts: opt.pts ?? null, time_on_question: dt, diag_id: state.diagId });
  document.querySelectorAll(".opt").forEach((el,idx) => el.classList.toggle("selected", idx===i));
  scorePill.textContent = totalScore();
  setTimeout(() => nextQuestion(), 360);
}
function nextQuestion(){
  if(!state.answers[QUESTIONS[state.qIndex].id]) return;
  if(state.qIndex < TOTAL_Q - 1){ state.qIndex++; saveState(); render(); }
  else { state.screen = "phone"; saveState(); render(); }
}
function prevQuestion(){
  const curId = state.screen === "phone" ? "phone" : QUESTIONS[state.qIndex]?.id;
  if(state.screen === "phone"){ state.screen = "question"; state.qIndex = TOTAL_Q - 1; }
  else if(state.qIndex > 0){ state.qIndex--; }
  else { return; }
  saveState();
  track("diag_back", { from: curId, to: QUESTIONS[state.qIndex]?.id || "intro", diag_id: state.diagId });
  render();
}
function goToResult(){
  if(!phoneValid()) return;
  state.finishedAt = new Date().toISOString();
  state.screen = "transition"; saveState();
  track("diag_phone_submit", { phone_length: state.phone.replace(/\D/g,"").length, diag_id: state.diagId });
  render(); window.scrollTo({ top:0, behavior:"smooth" });
}

async function saveResultToBackend(score, lvl){
  const mql = evaluateMql();
  const ranked = BLOCK_ORDER.map(b => ({ id:b, pct:blockPct(b), max:BLOCKS[b].max })).filter(x => x.max>0).sort((a,b) => a.pct - b.pct);
  const weakBlock = ranked[0]?.id || null;
  const respostasLabels = {};
  QUESTIONS.forEach(q => { respostasLabels[q.id] = state.answers[q.id] ? state.answers[q.id].label : null; });
  const blockPcts = {};
  BLOCK_ORDER.forEach(b => { blockPcts[b] = blockPct(b); });
  const respostasJsonb = {
    answers: respostasLabels, block_scores: blockPcts,
    bandeira: state.answers.P15?.val || null,
    papel_tag: state.answers.P42?.tag || null,
    mql_tag: mql.tag, cruza_mql: mql.cruzaMql, dimensao_fraca: weakBlock,
    diag_id: state.diagId, started_at: state.startedAt, finished_at: state.finishedAt,
    version: "v4"
  };
  const payload = {
    nome: null, telefone: state.phone || null, score: score, nivel: lvl.name,
    papel: state.answers.P42?.val || null, conhece: null, interesse: null, respostas: respostasJsonb
  };
  track("diag_view_result", { score_total: score, nivel: lvl.name, mql: mql.tag, diag_id: state.diagId });
  const client = getSupabase();
  if(!client){ console.warn("Supabase indisponível, resultado não salvo."); return; }
  try{
    const { error: e1 } = await client.from("diagnostico_respostas").insert(payload);
    if(e1){ console.error("Erro ao salvar:", e1); }
    else { const m = document.getElementById("saveMsg"); if(m) m.textContent = "Respostas registradas"; }
  }catch(e){ console.error("Falha no salvamento:", e); }
  try{
    await fetch(CONFIG.SUPABASE_URL + CONFIG.RD_CONVERSION_FN, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + CONFIG.SUPABASE_ANON_KEY, "apikey": CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify({
        telefone: state.phone, score_total: score, nivel: lvl.name,
        dimensao_fraca: weakBlock, papel_declarado: state.answers.P42?.val || null,
        bandeira: state.answers.P15?.val || null, cruza_mql: mql.cruzaMql,
        block_scores: blockPcts, diag_id: state.diagId
      }), keepalive: true
    });
  }catch(e){ console.warn("RD conversion best-effort falhou:", e); }
}

function ctaWhatsApp(){
  const score = totalScore();
  track("diag_cta_comercial", { score_total: score, diag_id: state.diagId });
  const msg = `Oi, acabei de fazer o diagnóstico do ClubPetro e tirei nota ${score} de 100. Quero análise completa do meu posto.`;
  const url = "https://wa.me/" + CONFIG.CLUBPETRO_WHATSAPP + "?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}
function nextTuesday19h(){
  const d = new Date();
  const offset = (2 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + offset); d.setHours(19, 0, 0, 0);
  return d;
}
function gcalDate(d){
  const pad = n => String(n).padStart(2,"0");
  return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"+pad(d.getUTCHours())+pad(d.getUTCMinutes())+"00Z";
}
function ctaRaiox(){
  const score = totalScore();
  const start = nextTuesday19h();
  const end = new Date(start.getTime() + 60*60*1000);
  track("diag_cta_raiox", { score_total: score, diag_id: state.diagId });
  const params = new URLSearchParams({
    action: "TEMPLATE",
    text: "RaioX do Posto · ClubPetro",
    details: "Conversa aberta no Meet sobre as dores que apareceram no seu diagnóstico de saúde do posto.",
    location: CONFIG.RAIOX_MEET_LINK,
    dates: gcalDate(start) + "/" + gcalDate(end)
  });
  window.open("https://calendar.google.com/calendar/render?" + params.toString(), "_blank");
}

(function init(){
  const saved = loadState();
  if(saved && (Object.keys(saved.answers||{}).length>0 || saved.qIndex>0)){
    state = { ...freshState(), ...saved }; state.screen = "welcome"; hasResumable = true;
  }
  window.addEventListener("pagehide", () => {
    if(state.screen === "result" || state.screen === "welcome") return;
    const elapsed = state.startedAt ? Math.round((Date.now() - new Date(state.startedAt).getTime())/1000) : 0;
    track("diag_abandon", { last_screen: state.screen, last_question: QUESTIONS[state.qIndex]?.id || null, time_total: elapsed, diag_id: state.diagId });
  });
  track("diag_view_intro", {});
  render();
})();
</script>
